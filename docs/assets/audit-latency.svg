  <text x="72" y="156" fill="#F5F1E8" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">
    <tspan x="72" dy="0" textLength="584" lengthAdjust="spacingAndGlyphs">First-token latency rose with context.</tspan>
  </text>
  <text x="72" y="210" fill="#AAB7C8" font-family="Arial, Helvetica, sans-serif" font-size="22">
    <tspan x="72" dy="0" textLength="626" lengthAdjust="spacingAndGlyphs">This is the clearest signal in the archived run:</tspan>
    <tspan x="72" dy="30" textLength="586" lengthAdjust="spacingAndGlyphs">longer prompts made the first-token wait explode.</tspan>
  </text>
