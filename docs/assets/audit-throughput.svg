  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="704" rx="24" fill="#FBF7F0" stroke="#D6CAB6"/>
  <text x="72" y="92" fill="#1F5AA6" font-family="'Courier New', monospace" font-size="15" letter-spacing="0.08em" textLength="280" lengthAdjust="spacingAndGlyphs">ARCHIVED MODAL AUDIT / THROUGHPUT</text>
  <text x="72" y="156" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">
    <tspan x="72" dy="0" textLength="620" lengthAdjust="spacingAndGlyphs">Throughput fell sharply as prompt length grew.</tspan>
  </text>
  <text x="72" y="210" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="22">
    <tspan x="72" dy="0" textLength="548" lengthAdjust="spacingAndGlyphs">The archived bundle only contains Disk-LLM rows,</tspan>
    <tspan x="72" dy="30" textLength="610" lengthAdjust="spacingAndGlyphs">so this figure is an audit snapshot rather than a final comparison.</tspan>
  </text>
  <rect x="60" y="274" width="316" height="384" rx="24" fill="url(#panelGlow)" stroke="#D6CAB6"/>
  <text x="88" y="320" fill="#4B5663" font-family="'Courier New', monospace" font-size="13" letter-spacing="0.05em" textLength="124" lengthAdjust="spacingAndGlyphs">KEY SIGNAL</text>
  <text x="88" y="404" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="700" textLength="188" lengthAdjust="spacingAndGlyphs">13.1x</text>
  <text x="88" y="444" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" textLength="158" lengthAdjust="spacingAndGlyphs">slower</text>
  <text x="88" y="512" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="88" dy="0" textLength="246" lengthAdjust="spacingAndGlyphs">Prompt 8: 0.204 tok/s</tspan>
    <tspan x="88" dy="28" textLength="258" lengthAdjust="spacingAndGlyphs">Prompt 128: 0.016 tok/s</tspan>
  </text>
  <text x="88" y="616" fill="#1F5AA6" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="88" dy="0" textLength="238" lengthAdjust="spacingAndGlyphs">Two generated tokens per case,</tspan>
    <tspan x="88" dy="24" textLength="222" lengthAdjust="spacingAndGlyphs">single archived run each.</tspan>
  </text>
  <rect x="418" y="274" width="720" height="384" rx="24" fill="#FFFFFF" stroke="#D6CAB6"/>
  <g opacity="0.45">
    <path d="M540 348V618" stroke="#D6CAB6"/>
    <path d="M540 402H1082" stroke="#E8DED0"/>
    <path d="M540 512H1082" stroke="#E8DED0"/>
    <path d="M540 618H1082" stroke="#E8DED0"/>
    <path d="M540 348H1082" stroke="#E8DED0"/>
    <path d="M665 348V618" stroke="#EFE5D8" stroke-dasharray="4 10"/>
    <path d="M790 348V618" stroke="#EFE5D8" stroke-dasharray="4 10"/>
    <path d="M915 348V618" stroke="#EFE5D8" stroke-dasharray="4 10"/>
    <path d="M1040 348V618" stroke="#EFE5D8" stroke-dasharray="4 10"/>
  </g>
  <text x="540" y="648" fill="#4B5663" font-family="'Courier New', monospace" font-size="13">0.00</text>
  <text x="658" y="648" fill="#4B5663" font-family="'Courier New', monospace" font-size="13">0.05</text>
  <text x="784" y="648" fill="#4B5663" font-family="'Courier New', monospace" font-size="13">0.10</text>
  <text x="909" y="648" fill="#4B5663" font-family="'Courier New', monospace" font-size="13">0.15</text>
  <text x="1034" y="648" fill="#4B5663" font-family="'Courier New', monospace" font-size="13">0.20 tok/s</text>
  <text x="452" y="424" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="114" lengthAdjust="spacingAndGlyphs">Prompt 8</text>
  <rect x="540" y="390" width="504" height="44" rx="22" fill="url(#barBlue)"/>
  <text x="1062" y="419" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="66" lengthAdjust="spacingAndGlyphs">0.204</text>
  <text x="438" y="534" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="128" lengthAdjust="spacingAndGlyphs">Prompt 128</text>
  <rect x="540" y="500" width="38" height="44" rx="22" fill="#EAB97A"/>
  <text x="598" y="529" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="52" lengthAdjust="spacingAndGlyphs">0.016</text>
  <text x="72" y="704" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="72" dy="0" textLength="892" lengthAdjust="spacingAndGlyphs">Interpretation: the archived pre-fix run shows strong prompt-length sensitivity, but it still lacks the corrected post-fix Disk-LLM versus HF CPU comparison.</tspan>
  </text>
