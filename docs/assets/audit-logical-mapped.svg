  <text x="602" y="419" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="52" lengthAdjust="spacingAndGlyphs">37.9</text>
  <text x="438" y="534" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="128" lengthAdjust="spacingAndGlyphs">Prompt 128</text>
