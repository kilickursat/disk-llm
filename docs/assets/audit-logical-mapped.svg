  <text x="1080" y="529" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" textLength="68" lengthAdjust="spacingAndGlyphs">492.6</text>
  <text x="72" y="704" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="17">
    <tspan x="72" dy="0" textLength="834" lengthAdjust="spacingAndGlyphs">Interpretation: Disk-LLM's audit story is not just speed and RSS. Logical mapped bytes expose the storage-facing behavior that most standard runtime dashboards hide.</tspan>
  </text>
