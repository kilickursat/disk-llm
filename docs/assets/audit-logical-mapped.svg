  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="704" rx="24" fill="#FBF8F2" stroke="#D6CAB6"/>
  <text x="72" y="92" fill="#1F5AA6" font-family="'Courier New', monospace" font-size="15" letter-spacing="0.08em" textLength="334" lengthAdjust="spacingAndGlyphs">ARCHIVED MODAL AUDIT / LOGICAL MAPPED</text>
  <text x="72" y="156" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">
    <tspan x="72" dy="0" textLength="694" lengthAdjust="spacingAndGlyphs">Logical mapped bytes scaled into the hundreds of GiB.</tspan>
  </text>
  <text x="72" y="210" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="22">
    <tspan x="72" dy="0" textLength="672" lengthAdjust="spacingAndGlyphs">This is one of the most distinctive Disk-LLM telemetry surfaces:</tspan>
    <tspan x="72" dy="30" textLength="640" lengthAdjust="spacingAndGlyphs">it measures what the runtime mapped logically, not what stayed resident in RAM.</tspan>
  </text>
  <rect x="60" y="274" width="316" height="384" rx="24" fill="#FFFFFF" stroke="#D6CAB6"/>
  <text x="88" y="320" fill="#4B5663" font-family="'Courier New', monospace" font-size="13" letter-spacing="0.05em" textLength="150" lengthAdjust="spacingAndGlyphs">TELEMETRY SIGNAL</text>
  <text x="88" y="404" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="700" textLength="204" lengthAdjust="spacingAndGlyphs">492.6</text>
  <text x="88" y="444" fill="#101214" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" textLength="80" lengthAdjust="spacingAndGlyphs">GiB</text>
  <text x="88" y="512" fill="#4B5663" font-family="Arial, Helvetica, sans-serif" font-size="20">
    <tspan x="88" dy="0" textLength="278" lengthAdjust="spacingAndGlyphs">Prompt 8: 37.9 GiB mapped</tspan>
    <tspan x="88" dy="28" textLength="298" lengthAdjust="spacingAndGlyphs">Prompt 128: 492.6 GiB mapped</tspan>
  </text>
  <text x="88" y="616" fill="#1F5AA6" font-family="Arial, Helvetica, sans-serif" font-size="18">
    <tspan x="88" dy="0" textLength="216" lengthAdjust="spacingAndGlyphs">This is a 13.0x increase</tspan>
    <tspan x="88" dy="24" textLength="234" lengthAdjust="spacingAndGlyphs">across the archived cases.</tspan>
  </text>
  <rect x="418" y="274" width="720" height="384" rx="24" fill="#FFFFFF" stroke="#D6CAB6"/>
  <g opacity="0.45">
